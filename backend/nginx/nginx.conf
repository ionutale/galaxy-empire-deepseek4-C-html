server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    set $upstream_user_id '';

    location /api/auth/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        access_by_lua_block {
            local jwt = require("resty.jwt")
            local auth_header = ngx.var.http_authorization

            if not auth_header then
                ngx.status = 401
                ngx.say('{"error":"missing authorization header"}')
                ngx.exit(401)
            end

            local _, _, token = string.find(auth_header, "Bearer%s+(.+)")
            if not token then
                ngx.status = 401
                ngx.say('{"error":"invalid authorization format"}')
                ngx.exit(401)
            end

            local secret = os.getenv("JWT_SECRET")
            if not secret then
                ngx.status = 500
                ngx.say('{"error":"server configuration error"}')
                ngx.exit(500)
            end

            local jwt_obj = jwt:verify(secret, token)
            if not jwt_obj.verified then
                ngx.status = 401
                ngx.say('{"error":"invalid or expired token"}')
                ngx.exit(401)
            end

            if not jwt_obj.payload.user_id then
                ngx.status = 401
                ngx.say('{"error":"invalid token payload"}')
                ngx.exit(401)
            end

            ngx.var.upstream_user_id = tostring(jwt_obj.payload.user_id)
        }

        proxy_set_header X-User-ID $upstream_user_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:8080;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

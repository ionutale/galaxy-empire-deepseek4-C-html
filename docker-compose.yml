services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: galaxy_empire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: galaxy_empire
      JWT_SECRET: change-me-in-production
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8080"
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: ./backend
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    environment:
      JWT_SECRET: change-me-in-production
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
